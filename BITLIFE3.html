<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>人生模拟器 · 命运之书</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Noto Serif SC', '楷体', KaiTi, serif;
      background: #1e1b18;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: background 0.6s ease;
    }
    body.infant { background: #f9e6cf; }
    body.childhood { background: #d4eac8; }
    body.teen { background: #c8dae0; }
    body.young_adult { background: #a0c4e2; }
    body.adult { background: #e2d5c1; }
    body.middle_age { background: #e0cfa3; }
    body.older { background: #d9c2a8; }
    body.elder { background: #c4a98e; }
    body.ending-bg { background: #2c2416; }
    .game-container {
      width: 100%;
      max-width: 750px;
      background: rgba(255,250,245,0.9);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.6);
      padding: 25px 20px;
      transition: all 0.4s ease;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .save-bar { display: flex; justify-content: flex-end; gap: 10px; }
    .save-btn, .load-btn {
      background: rgba(255,255,240,0.8); border: 1px solid #c9b78b;
      padding: 8px 16px; border-radius: 20px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; color: #4a3e2c; transition: 0.2s;
    }
    .save-btn:hover, .load-btn:hover { background: #f3e8d7; border-color: #b2976a; }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,240,0.7); border-radius: 100px; padding: 12px 25px;
    }
    .identity { display: flex; align-items: center; gap: 12px; }
    .avatar { font-size: 32px; background: #fff; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
    .char-name { font-weight: 700; font-size: 1.3rem; color: #3e362e; }
    .age-stage { font-size: 0.85rem; color: #7b6e5e; display: flex; gap: 6px; }
    .talent-badge { background: #e8d9b5; padding: 5px 15px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; color: #4a3f2e; }
    .attributes {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      background: rgba(255,250,240,0.8); border-radius: 30px; padding: 18px 20px;
    }
    .attr-item { display: flex; flex-direction: column; gap: 4px; }
    .attr-label { font-size: 0.8rem; font-weight: 600; color: #5b4f3c; }
    .attr-bar { height: 8px; background: #e2d9cc; border-radius: 20px; overflow: hidden; }
    .attr-fill { height: 100%; border-radius: 20px; transition: width 0.5s; background: #b99e6b; }
    .attr-value { font-size: 0.75rem; font-weight: 700; color: #3e362e; align-self: flex-end; }
    .story-card {
      background: #fffef7; border-radius: 35px; padding: 30px 25px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 20px;
      animation: fadeSlide 0.5s ease;
    }
    @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
    .stage-tag { font-size: 0.9rem; background: #f1e7d6; align-self: flex-start; padding: 6px 20px; border-radius: 30px; color: #5f4e32; font-weight: 600; }
    .narrative { font-size: 1.2rem; line-height: 1.7; color: #2e241a; }
    .options { display: flex; flex-direction: column; gap: 12px; margin-top: 5px; }
    .option-btn {
      background: #faf7f2; border: 2px solid #d6c9b3; padding: 14px 20px; border-radius: 25px;
      font-size: 1rem; font-weight: 500; color: #3c3328; cursor: pointer; transition: all 0.2s;
      text-align: left; display: flex; align-items: center; gap: 12px; background: #fffbf5;
    }
    .option-btn:hover { background: #f3e8d7; border-color: #b2976a; transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,0.08); }
    .option-icon { font-size: 1.4rem; }
    .talent-selection { text-align: center; }
    .talent-title { font-size: 2rem; font-weight: 700; color: #4a3822; }
    .talent-cards { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .talent-card {
      background: #fffbf2; border: 2px solid #dac29c; border-radius: 25px; padding: 20px 15px;
      width: 180px; cursor: pointer; transition: 0.2s; text-align: center; box-shadow: 0 5px 12px rgba(0,0,0,0.05);
    }
    .talent-card:hover { transform: translateY(-6px); border-color: #b3925c; box-shadow: 0 18px 25px rgba(0,0,0,0.12); }
    .talent-icon { font-size: 40px; }
    .talent-name { font-weight: 700; margin: 8px 0 4px; color: #4e3b28; }
    .talent-desc { font-size: 0.8rem; color: #6b5d4b; }
    .ending-panel { text-align: center; padding: 20px; }
    .ending-title { font-size: 2.5rem; font-weight: 700; color: #d4af37; margin-bottom: 15px; }
    .ending-summary { font-size: 1.2rem; color: #e3d5c0; line-height: 1.8; background: rgba(0,0,0,0.4); border-radius: 30px; padding: 25px; margin: 20px 0; }
    .final-attributes { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 20px 0; color: #d4c099; }
    .restart-btn { background: #d4af37; border: none; color: #1e1b18; font-weight: bold; padding: 14px 35px; border-radius: 40px; font-size: 1.1rem; cursor: pointer; margin-top: 15px; }
    .restart-btn:hover { background: #e6c454; }
    @media (max-width: 500px) { .attributes { grid-template-columns: repeat(2, 1fr); } .talent-cards { flex-direction: column; align-items: center; } }
  </style>
</head>
<body class="infant">
<div class="game-container" id="app"></div>

    // 辅助函数
    function resolveNext(next) { return typeof next === 'function' ? next() : next; }
    function applyEffects(effects) {
      for (let k in effects) {
        if (state.attr.hasOwnProperty(k)) {
          state.attr[k] += effects[k];
          if (state.attr[k] < 0) state.attr[k] = 0;
          if (state.attr[k] > 100) state.attr[k] = 100;
        }
      }
    }
    function getBarColor(v) { return v<30 ? '#c47b6b' : v<60 ? '#d4a853' : '#7fa07a'; }
    function getRandomTalents(n=3) { return [...talents].sort(()=>Math.random()-0.5).slice(0,n); }
    function setBodyClass(stage) {
      body.className = '';
      if (stage.includes('婴幼')) body.classList.add('infant');
      else if (stage.includes('童年')) body.classList.add('childhood');
      else if (stage.includes('青春')) body.classList.add('teen');
      else if (stage.includes('青年早期')) body.classList.add('young_adult');
      else if (stage.includes('青年')) body.classList.add('adult');
      else if (stage.includes('中年')) body.classList.add('middle_age');
      else if (stage.includes('中老年')) body.classList.add('older');
      else if (stage.includes('老年')||stage.includes('结局')) body.classList.add('elder');
      else if (stage.includes('命运')) body.classList.add('infant');
    }
    function saveGame() {
      localStorage.setItem('lifeSim', JSON.stringify({
        age:state.age, stage:state.stage, talent:state.talent,
        attr:state.attr, eventId:state.eventId, flags:state.flags, pendingNext:state.pendingNext
      }));
      alert('游戏已保存！');
    }
    function loadGame() {
      const s = localStorage.getItem('lifeSim');
      if (!s) { alert('无存档'); return false; }
      try {
        const d = JSON.parse(s);
        Object.assign(state, d); return true;
      } catch { alert('存档损坏'); return false; }
    }
    function triggerRandomEvent() {
      return Math.random() < (state.talent?.flag==='lucky' ? 0.35 : 0.2);
    }
    function getRandomEventId() {
      return randomEvents[Math.floor(Math.random()*randomEvents.length)].id;
    }

    // 渲染
    const app = document.getElementById('app');
    function renderAttributes() {
      return Object.entries(state.attr).map(([k,v]) => `
        <div class="attr-item"><div class="attr-label">${attrIcons[k]} ${attrNames[k]}</div>
        <div class="attr-bar"><div class="attr-fill" style="width:${v}%; background:${getBarColor(v)}"></div></div>
        <div class="attr-value">${v}</div></div>`).join('');
    }
    function buildHeader() {
      return `<div class="header"><div class="identity"><div class="avatar">🧑</div><div class="name-age"><span class="char-name">${state.name}</span><span class="age-stage">🎂 ${state.age}岁 · ${state.stage}</span></div></div>${state.talent?`<div class="talent-badge">${state.talent.icon} ${state.talent.name}</div>`:''}</div>`;
    }

    function renderTalentSelection() {
      const cards = getRandomTalents().map(t => `<div class="talent-card" data-talent-id="${t.id}"><div class="talent-icon">${t.icon}</div><div class="talent-name">${t.name}</div><div class="talent-desc">${t.desc}</div></div>`).join('');
      app.innerHTML = `<div class="save-bar"><button class="load-btn" id="loadBtn">📂 读档</button></div><div class="talent-selection story-card"><div class="talent-title">🌟 命运赐福</div><p>选择一项与生俱来的天赋</p><div class="talent-cards">${cards}</div></div>`;
      document.querySelectorAll('.talent-card').forEach(c=>c.addEventListener('click', function(){ selectTalent(this.dataset.talentId); }));
      document.getElementById('loadBtn').addEventListener('click', ()=>{ if(loadGame()) renderGame(); });
    }

    function selectTalent(id) {
      const t = talents.find(t=>t.id===id);
      if(!t) return alert('错误，请刷新');
      state.talent = t;
      if(t.effects) applyEffects(t.effects);
      state.eventId = "infant_start";
      state.age = 0;
      state.stage = "婴幼期 (0-6岁)";
      renderGame();
    }

    function renderGame() {
      if (state.eventId === 'talent_select') return renderTalentSelection();

      const randomEvent = randomEvents.find(r=>r.id===state.eventId);
      if (randomEvent) {
        state.stage = randomEvent.stage;
        state.age += randomEvent.ageIncrease||0;
        setBodyClass(state.stage);
        app.innerHTML = `<div class="save-bar"><button class="save-btn" id="saveBtn">💾 保存</button><button class="load-btn" id="loadBtn">📂 读档</button></div>${buildHeader()}<div class="attributes">${renderAttributes()}</div><div class="story-card" style="border:2px solid #d4af37;"><div class="stage-tag">✨ 偶然事件</div><div class="narrative">${randomEvent.desc}</div><button class="option-btn" id="continueRandomBtn">🔹 继续</button></div>`;
        document.getElementById('saveBtn').addEventListener('click', saveGame);
        document.getElementById('loadBtn').addEventListener('click', ()=>{ if(loadGame()) renderGame(); });
        document.getElementById('continueRandomBtn').addEventListener('click', continueRandom);
        return;
      }

      const event = events[state.eventId];
      if (!event) return;
      if (event.final) {
        setBodyClass('ending-bg');
        const attrSum = Object.entries(state.attr).map(([k,v])=>`<span>${attrIcons[k]} ${attrNames[k]}: ${v}</span>`).join(' ');
        app.innerHTML = `<div class="story-card ending-panel" style="background:rgba(30,25,20,0.85);color:#f0e3c8;"><div class="ending-title">🎭 ${event.stage}</div><div class="ending-summary">${event.desc}</div><div class="final-attributes">${attrSum}</div><p>天赋：${state.talent?.icon} ${state.talent?.name}</p><button class="restart-btn" id="restartBtn">🔄 重新开始</button></div>`;
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        return;
      }

      if (event.nextEvent && !event.options) {
        state.age += event.ageIncrease||0;
        state.eventId = event.nextEvent;
        const n = events[event.nextEvent];
        if(n?.stage) state.stage = n.stage;
        renderGame();
        return;
      }

      if (event.options) {
        state.stage = event.stage||state.stage;
        setBodyClass(state.stage);
        const opts = event.options.map((o,i)=>`<div class="option-btn" data-opt="${i}"><span class="option-icon">${['🔹','🔸','🔷','🔶'][i%4]}</span> ${o.text}</div>`).join('');
        app.innerHTML = `<div class="save-bar"><button class="save-btn" id="saveBtn">💾 保存</button><button class="load-btn" id="loadBtn">📂 读档</button></div>${buildHeader()}<div class="attributes">${renderAttributes()}</div><div class="story-card"><div class="stage-tag">📌 ${state.stage}</div><div class="narrative">${event.desc}</div><div class="options">${opts}</div></div>`;
        document.getElementById('saveBtn').addEventListener('click', saveGame);
        document.getElementById('loadBtn').addEventListener('click', ()=>{ if(loadGame()) renderGame(); });
        document.querySelectorAll('.option-btn').forEach(b=>b.addEventListener('click', function(){ makeChoice(parseInt(this.dataset.opt)); }));
      }
    }

    function makeChoice(idx) {
      const event = events[state.eventId];
      if(!event?.options) return;
      const chosen = event.options[idx];
      if(event.ageIncrease) state.age += event.ageIncrease;
      if(chosen.effects) applyEffects(chosen.effects);
      let nextId = resolveNext(chosen.next);
      if(!events[nextId]) return;
      if(!events[nextId].final && triggerRandomEvent()) {
        state.pendingNext = nextId;
        nextId = getRandomEventId();
      }
      state.eventId = nextId;
      const n = events[nextId];
      if(n?.stage) state.stage = n.stage;
      renderGame();
    }

    function continueRandom() {
      const re = randomEvents.find(r=>r.id===state.eventId);
      if(re?.effects) applyEffects(re.effects);
      const nid = state.pendingNext;
      state.pendingNext = null;
      if(nid && events[nid]) {
        state.eventId = nid;
        const n = events[nid];
        if(n?.stage) state.stage = n.stage;
      }
      renderGame();
    }

    function restartGame() {
      Object.assign(state, {
        age:0, stage:"命运之初", talent:null,
        attr:{intelligence:20,charm:20,wealth:20,health:30,happiness:30,morality:25},
        eventId:"talent_select", flags:{}, pendingNext:null
      });
      localStorage.removeItem('lifeSim');
      renderGame();
    }

    renderGame();
  })();
</script>
</body>
